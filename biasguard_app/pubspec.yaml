name: biasguard_app
description: BiasGuard — FairAI for Every Decision. Google Solution Challenge 2026.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.5

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Gemini AI
  google_generative_ai: ^0.4.7

  # Charts
  fl_chart: ^0.70.2

  # File operations
  file_picker: ^8.3.7
  csv: ^6.0.0

  # PDF
  pdf: ^3.11.2
  printing: ^5.14.2

  # UI & Animations
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.2
  lottie: ^3.3.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/demo/
